        .msg .name { font-weight: bold; color: #075e54; font-size: 12px; margin-bottom: 3px; }

        .input-area { display: flex; padding: 10px; background: #f0f0f0; gap: 5px; }
        .input-area input { flex: 1; padding: 10px; border: none; border-radius: 20px; outline: none; }
        .input-area button { background: #128c7e; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
