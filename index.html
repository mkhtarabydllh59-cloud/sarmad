<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات صنعاء 💬📞</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Tahoma; }
        body { background: #E5DDD5; }
       .login { position: fixed; inset: 0; background: #128C7E; display: flex; align-items: center; justify-content: center; z-index: 100; }
       .login-box { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 320px; text-align: center; }
       .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 18px; }
       .login-box button { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 16px; margin-top: 10px; }
       .header { background: #128C7E; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; display: none; }
       .call-btns { display: flex; gap: 10px; }
       .call-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; }
       .stories-bar { background: white; padding: 10px; display: flex; gap: 12px; overflow-x: auto; border-bottom: 1px solid #ddd; display: none; }
       .story-item { text-align: center; cursor: pointer; }
       .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #25D366; padding: 2px; background: white; }
       .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
       .story-circle.viewed { border-color: #ccc; }
       .story-name { font-size: 11px; margin-top: 4px; width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
       .add-story { border: 3px dashed #25D366; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #25D366; }
       .story-viewer { position: fixed; inset: 0; background: black; z-index: 200; display: none; }
       .story-content { width: 100%; height: 100%; object-fit: contain; }
       .story-progress { position: absolute; top: 10px; left: 10px; right: 10px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 3px; }
       .story-progress-bar { height: 100%; background: white; width: 0%; border-radius: 3px; }
       .story-user { position: absolute; top: 25px; left: 15px; color: white; display: flex; align-items: center; gap: 10px; }
       .story-close { position: absolute; top: 25px; right: 15px; color: white; font-size: 30px; cursor: pointer; }
       
        /* شاشة الاتصال */
       .call-screen { position: fixed; inset: 0; background: #1C1C1E; z-index: 300; display: none; color: white; text-align: center; }
       .call-info { padding-top: 80px; }
       .call-avatar { width: 120px; height: 120px; border-radius: 50%; margin: 20px auto; }
       .call-status { opacity: 0.7; margin: 10px 0; }
       .call-videos { position: absolute; inset: 0; }
       #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
       #localVideo { position: absolute; bottom: 120px; right: 20px; width: 120px; height: 180px; border-radius: 12px; object-fit: cover; border: 2px solid white; }
       .call-controls { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; }
       .call-control-btn { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px; }
       .end-call { background: #FF3B30; color: white; }
       .mute-btn { background: rgba(255,255,255,0.2); color: white; }
       
       .chat-box { height: calc(100vh - 245px); overflow-y: auto; padding: 10px; display: none; }
       .msg { max-width: 70%; padding: 8px 12px; margin: 5px 0; border-radius: 8px; background: #DCF8C6; margin-right: auto; }
       .msg img { max-width: 100%; border-radius: 8px; }
       .input-area { position: fixed; bottom: 0; width: 100%; background: #F0F0F0; padding: 8px; display: flex; gap: 8px; display: none; }
       .input-area input[type=text] { flex: 1; border: none; padding: 12px; border-radius: 25px; outline: none; }
       .btn { background: #25D366; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; }
        #verifyScreen, #nameScreen { display: none; }
       .code-box { letter-spacing: 8px; font-weight: bold; }
       .id-box { background: #FFF3CD; padding: 8px; border-radius: 8px; margin: 10px 0; font-size: 12px; }
    </style>
</head>
<body>
    <!-- شاشات الدخول -->
    <div class="login" id="phoneScreen">
        <div class="login-box">
            <h2>📱 تأكيد رقمك</h2>
            <input type="tel" id="phoneNumber" placeholder="967xxxxxxxxx" maxlength="12">
            <button onclick="sendCode()">التالي</button>
        </div>
    </div>
    <div class="login" id="verifyScreen">
        <div class="login-box">
            <h2>أدخل الكود</h2>
            <p>الكود: <span id="showCode"></span></p>
            <input type="tel" id="verifyCode" placeholder="------" maxlength="6" class="code-box">
            <button onclick="checkCode()">تأكيد</button>
        </div>
    </div>
    <div class="login" id="nameScreen">
        <div class="login-box">
            <h2>اكتب اسمك</h2>
            <input type="text" id="username" placeholder="اسمك في الشات">
            <button onclick="enterChat()">ابدأ الدردشة</button>
            <div class="id-box">ID حقك للإتصال: <b id="myPeerId">...</b></div>
        </div>
    </div>

    <!-- الهيدر مع أزرار اتصال -->
    <div class="header" id="header">
        <h1>شات صنعاء 💬</h1>
        <div class="call-btns">
            <button class="call-btn" onclick="startCall('audio')">📞</button>
            <button class="call-btn" onclick="startCall('video')">📹</button>
        </div>
    </div>

    <!-- شريط الستوري -->
    <div class="stories-bar" id="storiesBar">
        <div class="story-item
