<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سرمد الاختياري</title>
    <style>
        body { font-family: Arial; text-align: center; background: #1a1a2e; color: white; padding: 20px; }
       .game { background: #16213e; padding: 30px; border-radius: 15px; max-width: 500px; margin: 50px auto; }
        button { background: #0f3460; color: white; border: none; padding: 15px 30px; margin: 10px; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:hover { background: #e94560; }
        h1 { color: #e94560; }
    </style>
</head>
<body>
    <div class="game">
        <h1>لعبة سرمد الاختياري 🎮</h1>
        <p id="question">جاهز تبدأ اللعبة؟</p>
        <div id="options">
            <button onclick="startGame()">ابدأ اللعبة</button>
        </div>
        <p id="score">النقاط: 0</p>
    </div>

    <script>
        let score = 0;
        const questions = [
            {q: "وش عاصمة السعودية؟", a: ["الرياض", "جدة", "الدمام"], correct: 0},
            {q: "كم 5 + 5؟", a: ["8", "10", "12"], correct: 1},
            {q: "وش لون السماء؟", a: ["أخضر", "أزرق", "أحمر"], correct: 1}
        ];
        let currentQ = 0;

        function startGame() {
            currentQ = 0; score = 0;
            showQuestion();
        }

        function showQuestion() {
            if(currentQ >= questions.length) {
                document.getElementById('question').innerHTML = 'خلصت اللعبة! نتيجتك النهائية:';
                document.getElementById('options').innerHTML = `<h2>${score} / ${questions.length}</h2><button onclick="startGame()">العب مرة ثانية</button>`;
                return;
            }
            let q = questions[currentQ];
            document.getElementById('question').innerHTML = q.q;
            let optionsHTML = '';
            q.a.forEach((option, i) => {
                optionsHTML += `<button onclick="checkAnswer(${i})">${option}</button>`;
            });
            document.getElementById('options').innerHTML = optionsHTML;
            document.getElementById('score').innerHTML = `النقاط: ${score}`;
        }

        function checkAnswer(i) {
            if(i === questions[currentQ].correct) {
                score++;
                alert('صح عليك! 🎉');
            } else {
                alert('غلط 😅');
            }
            currentQ++;
            showQuestion();
        }
    </script>
</body>
</html>
