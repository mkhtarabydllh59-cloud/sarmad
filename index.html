  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 95%; max-width: 500px; height: 90vh; background: #1e293b; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }

    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
    .user { background: #3b82f6; align-self: flex-end; }
    .bot { background: #334155; align-self: flex-start; }
    .chat-input { display: flex; padding: 12px; background: #0f172a; gap: 8px; }
    .chat-input input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #1e293b; color: #fff; font-size: 16px; }
    .chat-input button { padding: 12px 18px; border: none; border-radius: 8px; background: #3b82f6; color: #fff; font-weight: bold; cursor: pointer; }
  </style>
