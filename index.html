<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات صنعاء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Tahoma, Arial; }
        body { background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }
.header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; }
        #login { background: white; margin: 50px 20px; padding: 30px; border-radius: 10px; text-align: center; }
        #login input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; }
        #login button { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 8px; font-size: 18px; }
        #chat { display: none; flex: 1; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
.msg { max-width: 70%; margin: 5px 0; padding: 8px 12px; border-radius: 8px; word-wrap: break-word; }
.me { background: #dcf8c6; margin-left: auto; }
.other { background: white; margin-right: auto; }
.name { font-weight: bold; font-size: 13px; color: #075e54; margin-bottom: 3px; }
.time { font-size: 11px; color: #667781; text-align: left; margin-top: 3px; }
.msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
.msg audio { width: 100%; margin-top: 5px; height: 40px; }
.input-area { display: flex; padding: 10px; background: #f0f0f0; align-items: center; gap: 8px; }
.input-area input[type="text"] { flex: 1; padding: 10px; border: none; border-radius: 20px; font-size: 16px; }
.btn { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
.btn:active { background: #054c44; }
.recording { background: #ff3b30!important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="header">شات صنعاء 💬🎤</div>
    <div id="login">
        <h2>أهلاً بك في شات صنعاء</h2>
        <input type="text" id="username" placeholder="اكتب اسمك...">
        <button onclick="joinChat()">دخول الشات</button>
    </div>
    <div id="chat">
        <div id="messages"></div>
        <div class="input-area">
            <label for="fileInput" class="btn">📎</label>
            <input type="file" id="fileInput" accept="image/*" onchange="sendImage(event)">
            <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn" id="micBtn">🎤</button>
            <button class="btn" onclick="sendMsg()">➤</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, push, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
          apiKey: "AIzaSyCE1VEe7k9wTr03ziA9H89xpfprgDNHqPg",
          authDomain: "nexus-chat-2026-a33be.firebaseapp.com",
          databaseURL: "https://nexus-chat-2026-a33be-default-rtdb.firebaseio.com",
          projectId: "nexus-chat-2026-a33be",
          storageBucket: "nexus-chat-2026-a33be.firebasestorage.app",
          messagingSenderId: "17858420468",
          appId: "1:17858420468:web:2aa30b440440f5b9c708a1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');
        let username = '';
        let mediaRecorder;
        let audioChunks = [];

        window.joinChat = function() {
            username = document.getElementById('username').value.trim();
            if (username) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('chat').style.display = 'flex';
                listenForMessages();
                setupMic();
            }
        }

        window.sendMsg = function() {
            const msgInput = document.getElementById('msgInput');
            const text = msgInput.value.trim();
            if (text && username) {
                push(messagesRef, { name: username, text: text, type: 'text', time: getTime() });
                msgInput.value = '';
            }
        }

        window.sendImage = async function(event) {
            const file = event.target.files[0];
            if (!file ||!username) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                push(messagesRef, { name: username, text: e.target.result, type: 'image', time: getTime() });
            };
            reader.readAsDataURL(file);
        }

        function setupMic() {
            const micBtn = document.getElementById('micBtn');
            micBtn.addEventListener('touchstart', startRecording);
            micBtn.addEventListener('mousedown', startRecording);
            micBtn.addEventListener('touchend', stopRecording);
            micBtn.addEventListener('mouseup', stopRecording);
            micBtn.addEventListener('mouseleave', stopRecording);
        }

        async function startRecording(e) {
            e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = sendAudio;
                mediaRecorder.start();
                document.getElementById('micBtn').classList.add('recording');
            } catch(err) {
                alert('لازم توافق على المايك عشان تسجل صوت');
            }
        }

        function stopRecording(e) {
            e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                document.getElementById('micBtn').classList.remove('recording');
            }
        }

        async function sendAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function(e) {
                push(messagesRef, { name: username, text: e.target.result, type: 'audio', time: getTime() });
            };
            reader.readAsDataURL(audioBlob);
        }

        function getTime() {
            return new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
        }

        function listenForMessages() {
            onChildAdded(messagesRef, (data) => {
                const msg = data.val();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg ' + (msg.name === username? 'me' : 'other');
                let content = '';
                if (msg.type === 'image') content = `<img src="${msg.text}">`;
                else if (msg.type === 'audio') content = `<audio controls src="${msg.text}"></audio>`;
                else content = `<div>${msg.text}</div>`;
                msgDiv.innerHTML = `${msg.name!== username? `<div class="name">${msg.name}</div>` : ''} ${content} <div class="time">${msg.time}</div>`;
                document.getElementById('messages').appendChild(msgDiv);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }
    </script>
</body>
</html>
