<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شات سرمد</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 95%; max-width: 500px; height: 90vh; background: #1e293b; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #3b82f6; padding: 16px; text-align: center; font-weight: bold; font-size: 18px; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
    .user { background: #3b82f6; align-self: flex-end; }
    .bot { background: #334155; align-self: flex-start; }
    .chat-input { display: flex; padding: 12px; background: #0f172a; gap: 8px; }
    .chat-input input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #1e293b; color: #fff; font-size: 16px; }
    .chat-input button { padding: 12px 18px; border: none; border-radius: 8px; background: #3b82f6; color: #fff; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">شات سرمد 🤖</div>
    <div class="chat-messages" id="messages">
      <div class="msg bot">هلا والله! أنا سرمد. وش تبي تسولف عنه؟</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="اكتب رسالتك..." />
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </div>
  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('userInput');
    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      input.value = '';
      setTimeout(() => {
        const replies = ['ههههه والله انك صادق', 'ياخي كلامك صحيح 100%', 'طيب وبعدين؟ كمل', 'اوكي فهمت عليك', 'ايه بالضبط! هذا اللي اقوله', 'ولله انك كفو'];
        const reply = replies[Math.floor(Math.random() * replies.length)];
        addMessage(reply, 'bot');
      }, 800);
    }
    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `msg ${sender}`;
      msg.textContent = text;
      messages.appendChild(msg);
      messages.scrollTop = messages.scrollHeight;
    }
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
